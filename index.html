<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 나눔 - 메인</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #1E1E1E; margin: 0; color: #FFFFFF; overflow: hidden; }
        
        /* 📍 좌측 상단 QR */
        .qr-container { position: fixed; top: 30px; left: 30px; background: rgba(42,42,42,0.9); padding: 15px; border-radius: 20px; border: 2px solid #E1FF00; text-align: center; z-index: 2000; }
        .qr-container img { width: 100px; height: 100px; background: white; padding: 5px; border-radius: 10px; }
        .qr-container p { margin: 5px 0 0; color: #E1FF00; font-size: 14px; font-weight: 900; }

        /* ⏱️ 우측 상단 타이머 */
        .timer-section { display: none; position: fixed; top: 30px; right: 30px; background: #2A2A2A; padding: 20px; border-radius: 20px; border: 3px solid #E1FF00; z-index: 2000; text-align: center; }
        #timeDisplay { font-size: 50px; font-weight: 900; color: #E1FF00; margin-bottom: 10px; }
        .timer-btn { background: #444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; margin: 2px; }

        h1 { color: #E1FF00; font-size: 60px; font-weight: 900; margin-bottom: 40px; }
        .main-btn { padding: 20px 50px; font-size: 26px; font-weight: 900; border-radius: 50px; cursor: pointer; margin: 10px; border: none; transition: 0.2s; }
        #shareBtn { background: #E1FF00; color: #1E1E1E; }
        #viewAllBtn { background: transparent; color: #E1FF00; border: 2px solid #E1FF00; }
        
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1E1E1E; padding: 40px; border-radius: 30px; border: 3px solid #E1FF00; z-index: 3000; width: 80%; max-width: 800px; max-height: 70vh; overflow-y: auto; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2500; }
        .question-item { font-size: 24px; padding: 20px; margin: 10px 0; background: #2A2A2A; border-radius: 15px; border-left: 8px solid #E1FF00; list-style: none; text-align: left; }
        .category-tag { padding: 3px 10px; border-radius: 5px; font-size: 14px; font-weight: 900; margin-right: 10px; }
        .tag-user { background: #E1FF00; color: #1E1E1E; }
    </style>
</head>
<body>

    <div class="qr-container">
        <img src="qr.png" alt="QR">
        <p>질문 남기기</p>
    </div>

    <div id="timerSection" class="timer-section">
        <div id="timeDisplay">05:00</div>
        <button class="timer-btn" onclick="pauseT()">일시정지</button>
        <button class="timer-btn" onclick="startT()">재개</button>
        <button class="timer-btn" onclick="resetT()" style="color:#FF3366">초기화</button>
    </div>

    <h1>오늘의 나눔</h1>

    <div class="button-group">
        <button id="shareBtn" class="main-btn">나눔 질문 뽑기</button>
        <button id="viewAllBtn" class="main-btn">참여자 질문 보기</button>
    </div>

    <div id="overlay"></div>

    <div id="drawPopup" class="popup">
        <h2 style="color:#E1FF00">선택된 질문</h2>
        <ul id="drawList" style="padding:0"></ul>
        <button class="main-btn" onclick="closePopups()" style="background:#444; color:white; font-size:18px">닫기</button>
    </div>

    <div id="allPopup" class="popup">
        <h2 style="color:#E1FF00">모든 질문 목록</h2>
        <ul id="allList" style="padding:0"></ul>
        <button class="main-btn" onclick="closePopups()" style="background:#444; color:white; font-size:18px">닫기</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtJZcxGVtO-yPHJUNo9AK9wl_2Bk7SpEw",
            authDomain: "mc-nanum.firebaseapp.com",
            databaseURL: "https://mc-nanum-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "mc-nanum",
            storageBucket: "mc-nanum.firebasestorage.app",
            messagingSenderId: "825929409039",
            appId: "1:825929409039:web:5e4fbe346f0273c3ee397a"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let remoteQ = [];
        // 📥 데이터 실시간 동기화 (항상 전체 목록을 가지고 있음)
        database.ref('questions').on('value', (snapshot) => {
            remoteQ = [];
            snapshot.forEach(child => {
                remoteQ.push(child.val().text);
            });
        });

        const daily = ["최근 감사했던 일은?", "오늘의 기분은?", "가장 맛있게 먹은 음식은?", "최근 즐거웠던 일은?"];
        let timeLeft = 300; let timerInterval = null;

        function startT() {
            if(timerInterval) return;
            timerInterval = setInterval(() => {
                if(timeLeft > 0) { timeLeft--; updateDisp(); }
                else { clearInterval(timerInterval); alert("시간 종료!"); }
            }, 1000);
        }
        function pauseT() { clearInterval(timerInterval); timerInterval = null; }
        function resetT() { pauseT(); timeLeft = 300; updateDisp(); }
        function updateDisp() {
            const m = Math.floor(timeLeft/60).toString().padStart(2,'0');
            const s = (timeLeft%60).toString().padStart(2,'0');
            document.getElementById('timeDisplay').textContent = `${m}:${s}`;
        }

        document.getElementById('shareBtn').onclick = () => {
            const list = document.getElementById('drawList');
            list.innerHTML = "";
            const add = (txt, isUser) => {
                const li = document.createElement('li'); li.className = 'question-item';
                li.innerHTML = isUser ? `<span class="category-tag tag-user">참여자</span> ${txt}` : txt;
                list.appendChild(li);
            };
            add(daily[Math.floor(Math.random()*daily.length)], false);
            // 참여자 질문 중 랜덤 2개
            const shuffled = [...remoteQ].sort(() => 0.5 - Math.random());
            shuffled.slice(0, 2).forEach(q => add(q, true));

            document.getElementById('overlay').style.display = 'block';
            document.getElementById('drawPopup').style.display = 'block';
            document.getElementById('timerSection').style.display = 'block';
            resetT(); startT();
        };

        document.getElementById('viewAllBtn').onclick = () => {
            const list = document.getElementById('allList');
            list.innerHTML = "";
            [...remoteQ].reverse().forEach(q => {
                const li = document.createElement('li'); li.className = 'question-item';
                li.innerHTML = q; list.appendChild(li);
            });
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('allPopup').style.display = 'block';
        };

        function closePopups() {
            document.getElementById('overlay').style.display = 'none';
            document.querySelectorAll('.popup').forEach(p => p.style.display = 'none');
            document.getElementById('timerSection').style.display = 'none';
            pauseT();
        }
    </script>
</body>
</html>
